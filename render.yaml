services:
  - type: web
    name: asd-onboarding-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MATTERMOST_TOKEN
        sync: false
      - key: PORT
        value: 10000
